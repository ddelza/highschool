<style>
  :root{
    --navy:#1c2b4a;
    --blue:#2f5fa8;

    --card:#ffffff;
    --muted:#6b7684;
    --accent:#e8641c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    color:#222;
  }
  header.site{
    background:var(--navy);
    color:#fff;
    padding:28px 20px 22px;
    text-align:center;
  }

  header.site p{margin:0;color:#c8d2e6;font-size:0.9rem;}

  .search-wrap{
    max-width:720px;
    margin:22px auto 0;
    padding:0 20px;
  }
  .search-box{
    display:flex;
    gap:8px;
    background:var(--card);
    border:2px solid var(--blue);
    border-radius:10px;
    padding:10px 14px;
  }
  .search-box input{
    flex:1;
    border:none;
    outline:none;
    font-size:1rem;
    background:transparent;
  }
  .search-box .hint{color:var(--muted);font-size:0.8rem;margin-top:6px;text-align:center;}
  .search-results{
    margin-top:10px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:none;
  }
  .search-results.show{display:block;}
  .search-results .result-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 16px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .search-results .result-item:last-child{border-bottom:none;}
  .search-results .result-item:hover{background:#eef3fb;}
  .result-item .dept{font-weight:bold;color:var(--blue);}
  .result-item .school{color:var(--muted);font-size:0.85rem;}
  .result-empty{padding:14px 16px;color:var(--muted);font-size:0.9rem;}

  nav.school-nav{
    max-width:1100px;
    margin:26px auto 0;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
    gap:10px;
  }
  nav.school-nav a{
    display:block;
    background:var(--card);
    border:1px solid var(--line);
    border-left:4px solid var(--blue);
    border-radius:8px;
    padding:10px 12px;
    text-decoration:none;
    color:var(--navy);
    font-size:0.88rem;
    font-weight:bold;
    transition:box-shadow .15s;
  }
  nav.school-nav a:hover{box-shadow:0 2px 8px rgba(0,0,0,.12);}

  main{
    max-width:1100px;
    margin:0 auto;
    padding:30px 20px 60px;
  }

  .school-page{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:26px 30px;
    margin-bottom:28px;
    scroll-margin-top:16px;
  }
  .school-page.flash{animation:flash 1.4s ease;}
  @keyframes flash{
    0%{box-shadow:0 0 0 4px rgba(232,100,28,.6);}
    100%{box-shadow:0 0 0 0 rgba(232,100,28,0);}
  }

  .school-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    border-bottom:2px solid var(--navy);
    padding-bottom:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
    gap:8px;
  }
  .school-head h2{margin:0;font-size:1.3rem;color:var(--navy);}
  .school-head .en{display:block;font-size:0.82rem;color:var(--muted);font-weight:normal;margin-top:2px;}
  .badge{
    display:inline-block;
    background:var(--blue);
    color:#fff;
    font-size:0.75rem;
    padding:4px 10px;
    border-radius:20px;
    white-space:nowrap;
  }

  .info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px 24px;
    margin-bottom:16px;
  }
  .info-block dt{font-size:0.75rem;color:var(--muted);margin-bottom:2px;}
  .info-block dd{margin:0;font-size:0.92rem;}
  .info-block.full{grid-column:1 / -1;}
  .info-block a{color:var(--blue);text-decoration:none;}

  h3.section-title{
    font-size:0.95rem;
    color:var(--navy);
    border-left:4px solid var(--accent);
    padding-left:8px;
    margin:18px 0 8px;
  }

  table.dept-table{
    width:100%;
    border-collapse:collapse;
    font-size:0.85rem;
  }
  table.dept-table th,table.dept-table td{
    border:1px solid var(--line);
    padding:6px 8px;
    text-align:center;
  }
  table.dept-table thead th{background:#eef2f7;color:var(--navy);}
  table.dept-table td.dept-name{text-align:left;font-weight:bold;color:var(--navy);}
  table.dept-table tfoot td{font-weight:bold;background:#f8fafc;}

  .staff-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:14px;
  }
  .staff-cell{
    background:#f8fafc;
    border:1px solid var(--line);
    border-radius:8px;
    text-align:center;
    padding:8px 4px;
  }
  .staff-cell .num{font-size:1.15rem;font-weight:bold;color:var(--navy);}
  .staff-cell .lbl{font-size:0.72rem;color:var(--muted);}

  .keywords{margin-top:4px;font-size:0.72rem;color:var(--muted);}
  .keywords span{
    display:inline-block;
    background:#eef2f7;
    border-radius:10px;
    padding:1px 8px;
    margin:2px 3px 0 0;
  }

  footer.site{
    text-align:center;
    color:var(--muted);
    font-size:0.8rem;
    padding:20px;
  }

  @media print{
    header.site, .search-wrap, nav.school-nav, footer.site{display:none;}
    body{background:#fff;}
    main{padding:0;max-width:none;}
    .school-page{
      border:none;
      border-radius:0;
      box-shadow:none;
      page-break-after:always;
      margin:0;
      padding:14mm 12mm;
    }
    .school-page:last-child{page-break-after:auto;}
  }
  @page{size:A4;margin:10mm;}
</style>
</head>

function sumDept(d){
  const cls = d.grades.reduce((a,g)=>a+g[0],0);
  const stu = d.grades.reduce((a,g)=>a+g[1],0);
  return {cls, stu};
}

function renderSchoolPage(s){
  const totalCls = s.departments.reduce((a,d)=>a+sumDept(d).cls,0);
  const totalStu = s.departments.reduce((a,d)=>a+sumDept(d).stu,0);

  const rows = s.departments.map(d=>{
    const tot = sumDept(d);
    return `<tr>
      <td class="dept-name">${d.name}</td>
      <td>${d.grades[0][0]}</td><td>${d.grades[0][1]}</td>
      <td>${d.grades[1][0]}</td><td>${d.grades[1][1]}</td>
      <td>${d.grades[2][0]}</td><td>${d.grades[2][1]}</td>
      <td>${tot.cls}</td><td>${tot.stu}</td>
    </tr>`;
  }).join("");

  const kw = [...new Set(s.departments.flatMap(d=>d.keywords))];

  return `
  <section class="school-page" id="${s.id}">
    <div class="school-head">
      <h2>${s.name}<span class="en">${s.nameEn}</span></h2>
      <span class="badge">${s.type}</span>
    </div>

    <div class="info-grid">
      <div class="info-block full"><dt>학교 주소</dt><dd>${s.address}</dd></div>
      <div class="info-block"><dt>교무실 전화번호</dt><dd>${s.office}</dd></div>
      <div class="info-block"><dt>행정실 전화번호</dt><dd>${s.admin}</dd></div>
      <div class="info-block"><dt>취업부</dt><dd>${s.job}</dd></div>
      <div class="info-block"><dt>FAX</dt><dd>${s.fax}</dd></div>
      <div class="info-block full"><dt>홈페이지 주소</dt><dd><a href="${s.homepage}" target="_blank" rel="noopener">${s.homepage}</a></dd></div>
    </div>

    <h3 class="section-title">학교현황 (학과별 학급/학생수)</h3>
    <table class="dept-table">
      <thead>
        <tr>
          <th rowspan="2">학과</th>
          <th colspan="2">1학년</th><th colspan="2">2학년</th><th colspan="2">3학년</th>
          <th colspan="2">합계</th>
        </tr>
        <tr>
          <th>학급</th><th>학생</th><th>학급</th><th>학생</th><th>학급</th><th>학생</th><th>학급</th><th>학생</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr><td>전체</td><td colspan="6"></td><td>${totalCls}</td><td>${totalStu}</td></tr>
      </tfoot>
    </table>

    <div class="staff-row">
      <div class="staff-cell"><div class="num">${s.staff.general}명</div><div class="lbl">일반 교원수</div></div>
      <div class="staff-cell"><div class="num">${s.staff.expert}명</div><div class="lbl">전문 교원수</div></div>
      <div class="staff-cell"><div class="num">${s.staff.other}명</div><div class="lbl">기타 교원수</div></div>
      <div class="staff-cell"><div class="num">${s.staff.admin}명</div><div class="lbl">직원수</div></div>
    </div>

    <div class="keywords">학과 키워드: ${kw.map(k=>`<span>${k}</span>`).join("")}</div>
  </section>`;
}

document.getElementById("mainContent").innerHTML = schools.map(renderSchoolPage).join("");
document.getElementById("schoolNav").innerHTML = schools.map(s=>`<a href="#${s.id}" data-target="${s.id}">${s.name.split(" (")[0]}</a>`).join("");

// nav click -> smooth scroll + flash
document.getElementById("schoolNav").addEventListener("click", e=>{
  const a = e.target.closest("a");
  if(!a) return;
  e.preventDefault();
  goToSchool(a.dataset.target);
});

function goToSchool(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.scrollIntoView({behavior:"smooth", block:"start"});
  el.classList.remove("flash");
  requestAnimationFrame(()=>el.classList.add("flash"));
}

// department keyword search
const searchInput = document.getElementById("deptSearch");
const resultsBox = document.getElementById("searchResults");

function buildIndex(){
  const idx = [];
  schools.forEach(s=>{
    s.departments.forEach(d=>{
      idx.push({school:s, dept:d});
    });
  });
  return idx;
}
const searchIndex = buildIndex();

function runSearch(q){
  q = q.trim().toLowerCase();
  if(!q){
    resultsBox.classList.remove("show");
    resultsBox.innerHTML = "";
    return;
  }
  const matches = searchIndex.filter(({dept})=>{
    if(dept.name.toLowerCase().includes(q)) return true;
    return dept.keywords.some(k=>k.toLowerCase().includes(q) || q.includes(k.toLowerCase()));
  });

  resultsBox.classList.add("show");
  if(matches.length===0){
    resultsBox.innerHTML = `<div class="result-empty">"${q}" 관련 학과를 찾을 수 없습니다.</div>`;
    return;
  }
  resultsBox.innerHTML = matches.map(({school,dept})=>`
    <div class="result-item" data-target="${school.id}">
      <span class="dept">${dept.name}</span>
      <span class="school">${school.name.split(" (")[0]} &rsaquo;</span>
    </div>`).join("");
}

searchInput.addEventListener("input", ()=>runSearch(searchInput.value));
resultsBox.addEventListener("click", e=>{
  const item = e.target.closest(".result-item");
  if(!item) return;
  goToSchool(item.dataset.target);
});
</script>
